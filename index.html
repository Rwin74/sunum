<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Teklif Yapılandırma - CPQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .premium-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 
                        0 2px 4px -1px rgba(0, 0, 0, 0.06),
                        0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .toggle-checkbox:checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .toggle-checkbox:checked + .toggle-label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
        }
        .counter-btn {
            transition: all 0.2s ease;
        }
        .counter-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .counter-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { motion, AnimatePresence } = Motion;

        // Webhook/Analytics tracking function
        const trackEvent = (eventName, data = {}) => {
            console.log('🎯 Tracking Event:', eventName, data);
            // In production, replace with actual webhook call
            // fetch('https://your-webhook-url.com', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ event: eventName, data, timestamp: new Date().toISOString() })
            // });
        };

        // Number counter animation component
        const NumberCounter = ({ value, duration = 1000, prefix = '', suffix = '' }) => {
            const [displayValue, setDisplayValue] = useState(0);

            useEffect(() => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    const currentValue = Math.floor(progress * (value - 0) + 0);
                    setDisplayValue(currentValue);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        setDisplayValue(value);
                    }
                };
                window.requestAnimationFrame(step);
            }, [value, duration]);

            return <span>{prefix}{displayValue.toLocaleString('tr-TR')}{suffix}</span>;
        };

        // Accordion Details Component
        const AccordionDetails = ({ details, isOpen }) => {
            return (
                <AnimatePresence>
                    {isOpen && (
                        <motion.div
                            initial={{ height: 0, opacity: 0 }}
                            animate={{ height: 'auto', opacity: 1 }}
                            exit={{ height: 0, opacity: 0 }}
                            transition={{ duration: 0.3, ease: 'easeInOut' }}
                            className="overflow-hidden"
                        >
                            <div className="mt-4 pt-4 border-t border-gray-200">
                                <ul className="space-y-2">
                                    {details.map((detail, index) => (
                                        <motion.li
                                            key={index}
                                            initial={{ opacity: 0, x: -10 }}
                                            animate={{ opacity: 1, x: 0 }}
                                            transition={{ delay: index * 0.1 }}
                                            className="flex items-start gap-2 text-sm text-gray-600"
                                        >
                                            <svg className="w-5 h-5 text-purple-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                                            </svg>
                                            <span>{detail}</span>
                                        </motion.li>
                                    ))}
                                </ul>
                            </div>
                        </motion.div>
                    )}
                </AnimatePresence>
            );
        };

        // Module Card Component
        const ModuleCard = ({ module, isLocked, isSelected, onToggle, onCounterChange, counterValue }) => {
            const [isDetailsOpen, setIsDetailsOpen] = useState(false);
            return (
                <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ duration: 0.5 }}
                    className={`glass-card rounded-2xl p-6 premium-shadow transition-all duration-300 ${
                        isSelected ? 'ring-2 ring-purple-500' : ''
                    }`}
                >
                    <div className="flex items-start justify-between mb-4">
                        <div className="flex-1">
                            <h3 className="text-xl font-bold text-gray-800 mb-2">{module.title}</h3>
                            <p className="text-gray-600 text-sm leading-relaxed">{module.description}</p>
                        </div>
                        {!isLocked && (
                            <motion.button
                                whileHover={{ scale: 1.05 }}
                                whileTap={{ scale: 0.95 }}
                                onClick={() => {
                                    onToggle(module.id);
                                    trackEvent(`${module.id}_Toggled`, { 
                                        action: isSelected ? 'disabled' : 'enabled',
                                        module: module.title 
                                    });
                                }}
                                className={`relative w-14 h-8 rounded-full transition-all duration-300 ${
                                    isSelected ? 'bg-gradient-to-r from-purple-500 to-indigo-500' : 'bg-gray-300'
                                }`}
                            >
                                <motion.div
                                    className={`absolute top-1 w-6 h-6 bg-white rounded-full shadow-md ${
                                        isSelected ? 'right-1' : 'left-1'
                                    }`}
                                    layout
                                />
                            </motion.button>
                        )}
                    </div>

                    {module.details && module.details.length > 0 && (
                        <motion.button
                            whileHover={{ scale: 1.02 }}
                            whileTap={{ scale: 0.98 }}
                            onClick={() => {
                                setIsDetailsOpen(!isDetailsOpen);
                                trackEvent(`${module.id}_Details_Toggled`, { opened: !isDetailsOpen });
                            }}
                            className="flex items-center gap-2 text-sm font-semibold text-purple-600 mb-4 hover:text-purple-700 transition-colors"
                        >
                            <span>Özellikleri Gör</span>
                            <motion.svg
                                animate={{ rotate: isDetailsOpen ? 180 : 0 }}
                                className="w-4 h-4 transition-transform"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                            </motion.svg>
                        </motion.button>
                    )}

                    <AccordionDetails details={module.details || []} isOpen={isDetailsOpen} />

                    <div className="flex items-center gap-4 pt-4 border-t border-gray-200">
                        <div className="flex-1">
                            <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">İlk Kurulum</p>
                            <p className="text-2xl font-bold gradient-text">
                                <NumberCounter value={module.setupPrice} duration={500} /> TL
                            </p>
                        </div>
                        {module.monthlyPrice > 0 ? (
                            <div className="flex-1">
                                <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">Aylık</p>
                                <p className="text-2xl font-bold gradient-text">
                                    <NumberCounter value={module.monthlyPrice} duration={500} /> TL
                                </p>
                            </div>
                        ) : (
                            <div className="flex-1">
                                <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">Ek Ücret</p>
                                <p className="text-2xl font-bold text-green-600">Yok</p>
                            </div>
                        )}
                    </div>

                    {module.type === 'counter' && (
                        <div className="mt-4 pt-4 border-t border-gray-200">
                            <p className="text-sm font-semibold text-gray-700 mb-3">Depo Sayısı</p>
                            <div className="flex items-center gap-4">
                                <motion.button
                                    whileHover={{ scale: 1.1 }}
                                    whileTap={{ scale: 0.9 }}
                                    onClick={() => {
                                        if (counterValue > 0) {
                                            onCounterChange(module.id, counterValue - 1);
                                            trackEvent(`${module.id}_Decremented`, { value: counterValue - 1 });
                                        }
                                    }}
                                    className="counter-btn w-12 h-12 rounded-xl bg-gray-100 text-2xl font-bold text-gray-700 flex items-center justify-center"
                                    disabled={counterValue === 0}
                                >
                                    −
                                </motion.button>
                                <span className="text-3xl font-bold text-gray-800 w-16 text-center">
                                    {counterValue}
                                </span>
                                <motion.button
                                    whileHover={{ scale: 1.1 }}
                                    whileTap={{ scale: 0.9 }}
                                    onClick={() => {
                                        onCounterChange(module.id, counterValue + 1);
                                        trackEvent(`${module.id}_Incremented`, { value: counterValue + 1 });
                                    }}
                                    className="counter-btn w-12 h-12 rounded-xl bg-gray-100 text-2xl font-bold text-gray-700 flex items-center justify-center"
                                >
                                    +
                                </motion.button>
                            </div>
                            <p className="text-xs text-gray-500 mt-2">Her depo için +10.000 TL kurulum, +5.000 TL aylık</p>
                        </div>
                    )}

                    {isLocked && (
                        <div className="mt-4 flex items-center gap-2">
                            <svg className="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                            </svg>
                            <span className="text-sm font-semibold text-green-600">Zorunlu - Aktif</span>
                        </div>
                    )}
                </motion.div>
            );
        };

        // Summary Card Component
        const SummaryCard = ({ selectedModules, warehouseCount, totalSetup, totalMonthly, onConfirm }) => {
            const benefits = [
                '✓ %35 Zaman Tasarrufu',
                '✓ %18 Verimlilik Artışı',
                '✓ Gerçek Zamanlı Envanter',
                '✓ Paraşüt Entegrasyonu',
                '✓ Otomatik Tahsilat',
                '✓ Mobil Erişim'
            ];

            return (
                <motion.div
                    initial={{ opacity: 0, x: 20 }}
                    animate={{ opacity: 1, x: 0 }}
                    transition={{ duration: 0.5 }}
                    className="glass-card rounded-2xl p-6 premium-shadow sticky top-6 lg:sticky lg:top-6 fixed bottom-0 left-0 right-0 lg:relative lg:bottom-auto lg:left-auto lg:right-auto z-50 lg:z-auto rounded-b-none lg:rounded-2xl"
                >
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Sepet Özeti</h2>

                    <div className="space-y-3 mb-6">
                        <AnimatePresence>
                            {selectedModules.map((module) => (
                                <motion.div
                                    key={module.id}
                                    initial={{ opacity: 0, x: -20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    exit={{ opacity: 0, x: -20 }}
                                    className="flex items-center justify-between text-sm"
                                >
                                    <span className="text-gray-700">{module.title}</span>
                                    <span className="text-purple-600 font-semibold">Eklendi</span>
                                </motion.div>
                            ))}
                            {warehouseCount > 0 && (
                                <motion.div
                                    initial={{ opacity: 0, x: -20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    className="flex items-center justify-between text-sm"
                                >
                                    <span className="text-gray-700">Ekstra Depo ({warehouseCount} adet)</span>
                                    <span className="text-purple-600 font-semibold">Eklendi</span>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>

                    <div className="bg-gradient-to-r from-purple-50 to-indigo-50 rounded-xl p-4 mb-6">
                        <h3 className="text-sm font-semibold text-gray-700 mb-3">Aktif Faydalar</h3>
                        <div className="space-y-2">
                            {benefits.map((benefit, index) => (
                                <motion.p
                                    key={index}
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    transition={{ delay: index * 0.1 }}
                                    className="text-sm text-gray-600"
                                >
                                    {benefit}
                                </motion.p>
                            ))}
                        </div>
                    </div>

                    <div className="border-t border-gray-200 pt-6 space-y-4">
                        <div>
                            <p className="text-sm text-gray-500 uppercase tracking-wider mb-1">İlk Kurulum Bedeli</p>
                            <p className="text-4xl font-bold gradient-text">
                                <NumberCounter value={totalSetup} duration={800} /> TL
                            </p>
                        </div>
                        <div>
                            <p className="text-sm text-gray-500 uppercase tracking-wider mb-1">Aylık Abonelik Bedeli</p>
                            <p className="text-4xl font-bold gradient-text">
                                <NumberCounter value={totalMonthly} duration={800} /> TL
                            </p>
                        </div>
                    </div>

                    <motion.button
                        whileHover={{ scale: 1.02 }}
                        whileTap={{ scale: 0.98 }}
                        onClick={() => {
                            trackEvent('Confirm_Button_Clicked', {
                                selectedModules: selectedModules.map(m => m.id),
                                warehouseCount,
                                totalSetup,
                                totalMonthly
                            });
                            onConfirm();
                        }}
                        className="btn-gradient w-full py-4 rounded-xl text-white font-bold text-lg mt-6"
                    >
                        Teklifi Onayla / İletişime Geç
                    </motion.button>
                </motion.div>
            );
        };

        // Main App Component
        const App = () => {
            const [selectedModules, setSelectedModules] = useState(['core']);
            const [warehouseCount, setWarehouseCount] = useState(0);

            const modules = [
                {
                    id: 'core',
                    title: 'Entegre Komuta Merkezi ve ERP',
                    description: 'Geleneksel dağınık yapıyı bitiren ana sistem. %35 zaman tasarrufu, %18 verimlilik artışı. Gerçek zamanlı envanter ve Paraşüt entegrasyonu dahildir.',
                    setupPrice: 120000,
                    monthlyPrice: 15000,
                    type: 'locked',
                    details: [
                        'Merkez Depo (WMS): Saniyelik stok ve maliyet takibi',
                        'Finans & Çift Cari: Resmi ve gayriresmi iki ayrı kasa takibi',
                        'Patron Ekranı: Tam maliyet gizliliği ve tek tuşla şirket kârlılık analizi',
                        'Araç Otomasyonu: Merkezden araca otomatik stok zimmetleme'
                    ]
                },
                {
                    id: 'b2b-portal',
                    title: 'B2B Müşteri Portalı',
                    description: 'Bayilerin kendi siparişlerini girmesini sağlar, manuel veri girişi hatalarını sıfırlar.',
                    setupPrice: 30000,
                    monthlyPrice: 5000,
                    type: 'toggle',
                    details: [
                        '7/24 Sipariş: Bayi ve müşterilerin 7/24 kendi kendine sipariş verebilmesi',
                        'Özel Fiyatlama: Her bayiye sistem üzerinden özel fiyat listesi ve iskonto tanımlayabilme',
                        'Gece Vardiyası Otomasyonu: Gece girilen siparişlerin sabahki rota listelerine otomatik yansıması'
                    ]
                },
                {
                    id: 'mobile-app',
                    title: 'Native Mobil Uygulama (iOS & Android)',
                    description: 'Firmanızın adıyla mağazalarda yer alan, saha ekiplerine özel hızlandırılmış arayüz. %20-%40 satış artışı potansiyeli.',
                    setupPrice: 60000,
                    monthlyPrice: 833,
                    type: 'toggle',
                    details: [
                        'Anında Belge: Satış onaylandığı saniye, Bluetooth mobil yazıcıdan irsaliye dökülmesi',
                        'Otomatik Düşüş: Teslim edilen ürünün anında genel stoktan ve araç zimmetinden düşmesi'
                    ]
                },
                {
                    id: 'virtual-pos',
                    title: 'Sanal POS ve Tahsilat Otomasyonu',
                    description: 'Kredi kartı ile anında tahsilat. Geciken tahsilat sorununu tamamen ortadan kaldırır.',
                    setupPrice: 10000,
                    monthlyPrice: 0,
                    type: 'toggle',
                    details: []
                },
                {
                    id: 'warehouse',
                    title: 'Ekstra Depo Yönetimi Sayısı',
                    description: 'Çoklu depo yapısı olan işletmeler için her depo için ayrı envanter ve sevkiyat rotası yönetimi.',
                    setupPrice: 10000,
                    monthlyPrice: 5000,
                    type: 'counter',
                    details: []
                }
            ];

            const handleToggle = (moduleId) => {
                setSelectedModules(prev => {
                    const newSelection = prev.includes(moduleId)
                        ? prev.filter(id => id !== moduleId)
                        : [...prev, moduleId];
                    return newSelection;
                });
            };

            const handleCounterChange = (moduleId, value) => {
                setWarehouseCount(value);
                if (value > 0 && !selectedModules.includes(moduleId)) {
                    setSelectedModules(prev => [...prev, moduleId]);
                } else if (value === 0) {
                    setSelectedModules(prev => prev.filter(id => id !== moduleId));
                }
            };

            const calculateTotals = () => {
                let totalSetup = 0;
                let totalMonthly = 0;

                selectedModules.forEach(moduleId => {
                    const module = modules.find(m => m.id === moduleId);
                    if (module) {
                        if (module.id === 'warehouse') {
                            totalSetup += module.setupPrice * warehouseCount;
                            totalMonthly += module.monthlyPrice * warehouseCount;
                        } else {
                            totalSetup += module.setupPrice;
                            totalMonthly += module.monthlyPrice;
                        }
                    }
                });

                return { totalSetup, totalMonthly };
            };

            const { totalSetup, totalMonthly } = calculateTotals();
            const selectedModuleObjects = modules.filter(m => selectedModules.includes(m.id) && m.id !== 'warehouse');

            const handleConfirm = () => {
                const selectedModuleObjects = modules.filter(m => selectedModules.includes(m.id));
                let message = `*ERP Teklif - Yunus Bey*\n\n`;
                message += `*Seçilen Modüller:*\n`;
                
                selectedModuleObjects.forEach(module => {
                    if (module.id === 'warehouse') {
                        message += `• ${module.title} (${warehouseCount} adet)\n`;
                        message += `  Kurulum: ${module.setupPrice * warehouseCount.toLocaleString('tr-TR')} TL\n`;
                        message += `  Aylık: ${module.monthlyPrice * warehouseCount.toLocaleString('tr-TR')} TL\n`;
                    } else {
                        message += `• ${module.title}\n`;
                        message += `  Kurulum: ${module.setupPrice.toLocaleString('tr-TR')} TL\n`;
                        if (module.monthlyPrice > 0) {
                            message += `  Aylık: ${module.monthlyPrice.toLocaleString('tr-TR')} TL\n`;
                        } else {
                            message += `  Aylık: Yok\n`;
                        }
                    }
                    message += `\n`;
                });

                message += `*TOPLAM:*\n`;
                message += `İlk Kurulum: ${totalSetup.toLocaleString('tr-TR')} TL\n`;
                message += `Aylık Abonelik: ${totalMonthly.toLocaleString('tr-TR')} TL\n\n`;
                message += `Teklifi onaylıyorum, iletişime geçebilirsiniz.`;

                const whatsappUrl = `https://wa.me/905447218974?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank');
            };

            return (
                <div className="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
                    <div className="max-w-7xl mx-auto">
                        <motion.div
                            initial={{ opacity: 0, y: -20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.6 }}
                            className="text-center mb-12"
                        >
                            <p className="text-lg text-purple-600 font-semibold mb-2">Yunus Bey için hazırlandı</p>
                            <h1 className="text-3xl font-bold gradient-text mb-4">
                                ERP Teklif Yapılandırma
                            </h1>
                            <p className="text-xl text-gray-600">
                                İşletmenizi geleceğe taşıyan custom ERP çözümünüzü tasarlayın
                            </p>
                        </motion.div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-6">
                                {modules.map((module, index) => (
                                    <ModuleCard
                                        key={module.id}
                                        module={module}
                                        isLocked={module.type === 'locked'}
                                        isSelected={selectedModules.includes(module.id)}
                                        onToggle={handleToggle}
                                        onCounterChange={handleCounterChange}
                                        counterValue={warehouseCount}
                                    />
                                ))}
                            </div>

                            <div className="lg:col-span-1">
                                <SummaryCard
                                    selectedModules={selectedModuleObjects}
                                    warehouseCount={warehouseCount}
                                    totalSetup={totalSetup}
                                    totalMonthly={totalMonthly}
                                    onConfirm={handleConfirm}
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
